spring.application.name=splitwise-backend

# MongoDB configuration (adjust URI for your environment)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/splitwise}

# Server configuration
server.port=${PORT:8080}

# Default currency
app.default-currency=INR

# Firebase service account json path (provide absolute path or classpath resource)
firebase.service-account-file=${FIREBASE_SERVICE_ACCOUNT_FILE:}

# JWT configuration (change secret in real deployments)
# Default is a 256-bit (32+ char) key to satisfy JJWT requirements
jwt.secret=${JWT_SECRET:super-secret-development-jwt-key-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

